name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Apple notarization key
        run: |
          mkdir -p "$RUNNER_TEMP/apple"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 -D > "$RUNNER_TEMP/apple/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/apple/AuthKey.p8"
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}

      - name: Import Apple signing certificate
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/apple"
          printf '%s' "$MAC_CSC_LINK" | base64 -D > "$RUNNER_TEMP/apple/certificate.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/apple/build.keychain"
          security set-keychain-settings -lut 21600 "$RUNNER_TEMP/apple/build.keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/apple/build.keychain"
          security default-keychain -s "$RUNNER_TEMP/apple/build.keychain"
          security list-keychains -d user -s "$RUNNER_TEMP/apple/build.keychain" login.keychain

          security import "$RUNNER_TEMP/apple/certificate.p12" \
            -k "$RUNNER_TEMP/apple/build.keychain" \
            -P "$MAC_CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/apple/build.keychain"
          SIGNING_IDENTITIES="$(security find-identity -p codesigning -v "$RUNNER_TEMP/apple/build.keychain")"
          printf '%s\n' "$SIGNING_IDENTITIES"
          if ! grep -q 'Developer ID Application: Zhenghao Jia (4SWSN4QB7Y)' <<< "$SIGNING_IDENTITIES"; then
            echo "::error::No valid Developer ID Application signing identity was imported."
            exit 1
          fi
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}

      - name: Build and publish macOS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_KEY: ${{ runner.temp }}/apple/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist:mac -- --publish always

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win -- --publish always

  update-release-notes:
    name: Update release notes
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update GitHub Release body
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const tag = context.ref.replace("refs/tags/", "");
            const version = tag.replace(/^v/, "");
            const notesPath = path.join(".github", "release-notes", `${tag}.md`);
            const fallbackBody = [
              `# Brevyn ${version}`,
              "",
              "This release contains desktop packaging updates and stability improvements.",
            ].join("\n");
            const body = fs.existsSync(notesPath) ? fs.readFileSync(notesPath, "utf8") : fallbackBody;

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const release = releases.find((item) => item.tag_name === tag);
            if (!release) {
              throw new Error(`Release not found for ${tag}`);
            }

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: `Brevyn ${version}`,
              body,
            });
