# electron-builder configuration for Brevyn desktop builds.
appId: app.brevyn.desktop
productName: Brevyn
copyright: Copyright © 2026 Brevyn

electronVersion: 39.5.1
electronDist: node_modules/electron/dist

directories:
  output: out
  buildResources: resources

compression: normal
npmRebuild: false

asar: true
asarUnpack:
  # Agent and skill helper scripts may run in a normal Node.js process outside
  # Electron's ASAR-aware module loader, so runtime dependencies must exist on
  # the real filesystem.
  - "node_modules/**/*"

files:
  - dist/**/*
  - package.json
  # Keep runtime dependencies available for externalized main-process modules
  # and Brevyn skill helper scripts copied into user data.
  - node_modules/**/*
  - "!node_modules/.cache/**"
  - "!node_modules/electron/dist/**"
  - "!node_modules/electron-builder/**"

extraResources:
  # Bundled default skills. In packaged builds these are read from
  # process.resourcesPath/default-skills and synced into ~/.brevyn-dev.
  - from: default-skills
    to: default-skills
    filter:
      - "**/*"
  - from: dist/native
    to: native
    filter:
      - "**/*"

mac:
  category: public.app-category.education
  icon: resources/icon.icns
  target:
    - dmg
    - zip

win:
  icon: resources/icon.ico
  target:
    - nsis

linux:
  icon: resources/icon.png
  target:
    - AppImage

# Auto-update publish target. Publish with:
#   GH_TOKEN=... npm run dist -- --publish always
# macOS auto-update requires the zip target above so electron-builder can
# generate latest-mac.yml alongside the release assets.
publish:
  provider: github
  owner: KOIAI777
  repo: brevyn-desktop
