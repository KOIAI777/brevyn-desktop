extraResources:
  - from: resources/icon.png
    to: icon.png
  # Bundled default skills. In packaged builds these are read from
  # process.resourcesPath/default-skills and synced into ~/.brevyn-dev.
  - from: default-skills
    to: default-skills
    filter:
      - "**/*"
  - from: dist/native
    to: native
    filter:
      - "**/*"

mac:
  category: public.app-category.education
  icon: resources/icon.icns
  target:
    - dmg
    - zip

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  icon: resources/icon.png
  target:
    - AppImage

# Auto-update publish target. Publish with:
#   GH_TOKEN=... npm run dist -- --publish always
# macOS auto-update requires the zip target above so electron-builder can
# generate latest-mac.yml alongside the release assets.
publish:
  provider: github
  owner: KOIAI777
  repo: brevyn-desktop
